<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Mechanical Energy Simulator</title>

  <link rel="stylesheet" href="./style.css" />
</head>

<body>

  <div class="app">

    <section class="simulation-area">
      <canvas id="simCanvas"></canvas>

      <div class="hud" id="statusText">
        Running
      </div>
    </section>

    <aside class="sidebar">

      <h1>Mechanical Energy</h1>
      <p class="subtitle">
        Interactive Physics Lab
      </p>

      <div class="energy-panel">

        <div class="energy-title">
          Energy Monitor
        </div>

        <div class="energy-row">
          <div class="energy-top">
            <div class="energy-name">Potential</div>
            <div class="energy-value" id="peValue">0 J</div>
          </div>

          <div class="energy-bg">
            <div class="energy-fill pe" id="peBar"></div>
          </div>
        </div>

        <div class="energy-row">
          <div class="energy-top">
            <div class="energy-name">Kinetic</div>
            <div class="energy-value" id="keValue">0 J</div>
          </div>

          <div class="energy-bg">
            <div class="energy-fill ke" id="keBar"></div>
          </div>
        </div>

        <div class="energy-row">
          <div class="energy-top">
            <div class="energy-name">Elastic</div>
            <div class="energy-value" id="eeValue">0 J</div>
          </div>

          <div class="energy-bg">
            <div class="energy-fill ee" id="eeBar"></div>
          </div>
        </div>

        <div class="energy-row">
          <div class="energy-top">
            <div class="energy-name">Total</div>
            <div class="energy-value" id="meValue">0 J</div>
          </div>

          <div class="energy-bg">
            <div class="energy-fill me" id="meBar"></div>
          </div>
        </div>

      </div>

      <div class="panel">

        <h2>Initial Conditions</h2>

        <label>
          Initial Velocity

          <input
            type="range"
            id="velocity"
            min="0"
            max="40"
            value="12"
          />

          <span id="velocityLabel">
            12 m/s
          </span>
        </label>

        <label>
          Starting Position

          <input
            type="range"
            id="position"
            min="0"
            max="100"
            value="10"
          />

          <span id="positionLabel">
            10%
          </span>
        </label>

      </div>

      <div class="panel">

        <h2>Time Controls</h2>

        <div class="button-row">
          <button id="playBtn">Play</button>
          <button id="pauseBtn">Pause</button>
          <button id="resetBtn">Reset</button>
        </div>

        <label>
          Time Scale

          <input
            type="range"
            id="timeScale"
            min="0.1"
            max="2"
            step="0.1"
            value="1"
          />

          <span id="timeScaleLabel">
            1x
          </span>
        </label>

      </div>

      <div class="panel">

        <h2>Physics Parameters</h2>

        <label>
          Mass

          <input
            type="range"
            id="mass"
            min="1"
            max="20"
            value="5"
          />

          <span id="massLabel">
            5 kg
          </span>
        </label>

        <label>
          Gravity

          <input
            type="range"
            id="gravity"
            min="1"
            max="25"
            step="0.1"
            value="9.81"
          />

          <span id="gravityLabel">
            9.81
          </span>
        </label>

        <label>
          Friction

          <input
            type="range"
            id="friction"
            min="0"
            max="1"
            step="0.01"
            value="0.02"
          />

          <span id="frictionLabel">
            0.02
          </span>
        </label>

      </div>

      <div class="panel">

        <h2>Spring Variables</h2>

        <label>
          Spring Constant (k)

          <input
            type="range"
            id="spring"
            min="20"
            max="500"
            value="120"
          />

          <span id="springLabel">
            120 N/m
          </span>
        </label>

        <label>
          Damping

          <input
            type="range"
            id="springDamping"
            min="0"
            max="8"
            step="0.1"
            value="1.5"
          />

          <span id="springDampingLabel">
            1.5
          </span>
        </label>
      </div>

      <div class="panel">

        <h2>Terrain Heights</h2>

        <label>
          h₁ Left Height

          <input
            type="range"
            id="h1"
            min="1"
            max="5"
            step="0.1"
            value="2"
          />

          <span id="h1Label">
            2.0 m
          </span>
        </label>

        <label>
          h₂ Valley Height

          <input
            type="range"
            id="h2"
            min="0"
            max="3"
            step="0.1"
            value="0.5"
          />

          <span id="h2Label">
            0.5 m
          </span>
        </label>

        <label>
          h₃ Right Height

          <input
            type="range"
            id="h3"
            min="1"
            max="6"
            step="0.1"
            value="2.5"
          />

          <span id="h3Label">
            2.5 m
          </span>
        </label>

      </div>

    </aside>

  </div>

  <script src="./script.js"></script>

</body>
</html>
